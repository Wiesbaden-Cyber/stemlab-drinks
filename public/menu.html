<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stemlab Drinks — Menu Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
      min-height: 100vh;
      padding: 20px;
    }

    /* ── PIN OVERLAY ── */
    .pin-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .pin-overlay.hidden { display: none; }
    .pin-box {
      background: white; border-radius: 16px; padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); max-width: 400px; width: 100%;
    }
    .pin-box h2 { color: #1e293b; margin-bottom: 8px; font-size: 1.8rem; }
    .pin-box p  { color: #64748b; margin-bottom: 24px; font-size: 0.95rem; }
    .pin-input-group { margin-bottom: 20px; }
    .pin-input-group input {
      width: 100%; padding: 14px 16px; font-size: 1.1rem;
      border-radius: 10px; border: 2px solid #cbd5e1; outline: none;
      transition: all 0.2s; letter-spacing: 0.1em;
    }
    .pin-input-group input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .pin-submit {
      width: 100%; padding: 14px; font-size: 1.05rem; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white; font-weight: 700; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    .pin-submit:hover { background: linear-gradient(135deg,#1e40af,#1e3a8a); transform: translateY(-1px); }
    .pin-error { color: #dc2626; font-size: 0.9rem; margin-top: 12px; display: none; }

    /* ── MAIN CARD ── */
    .container {
      max-width: 1100px; margin: auto; background: white;
      border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden; display: none;
    }
    .container.visible { display: block; }

    .header {
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white; padding: 28px 30px;
      display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .header h1   { font-size: 1.9rem; font-weight: 700; margin-bottom: 4px; }
    .header .sub { font-size: 0.9rem; opacity: 0.85; }
    .logout-btn {
      padding: 9px 20px; font-size: 0.9rem; border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.12);
      color: white; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.22); }

    /* ── SAVE BANNER ── */
    .save-banner {
      display: none; align-items: center; justify-content: space-between; gap: 16px;
      padding: 14px 30px;
      background: #fffbeb; border-bottom: 2px solid #fbbf24;
    }
    .save-banner.visible { display: flex; }
    .save-banner-text { font-size: 0.95rem; font-weight: 600; color: #92400e; }
    .save-all-btn {
      padding: 9px 24px; font-size: 0.95rem; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: white; font-weight: 700; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 3px 10px rgba(5,150,105,0.3);
      white-space: nowrap;
    }
    .save-all-btn:hover { background: linear-gradient(135deg,#047857,#065f46); transform: translateY(-1px); }
    .save-all-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .discard-btn {
      padding: 9px 18px; font-size: 0.9rem; border-radius: 8px;
      border: 2px solid #d97706; background: white;
      color: #b45309; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .discard-btn:hover { background: #fffbeb; }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; gap: 12px; align-items: center; justify-content: space-between;
      flex-wrap: wrap; padding: 14px 30px;
      background: #f8fafc; border-bottom: 1px solid #e2e8f0;
    }
    .status  { color: #64748b; font-size: 0.9rem; }
    .links   { display: flex; gap: 16px; }
    .links a { font-size: 0.9rem; color: #2563eb; text-decoration: none; font-weight: 500; }
    .links a:hover { color: #1e40af; text-decoration: underline; }

    /* ── CONTENT ── */
    .content { padding: 30px; }

    /* Add form */
    .section-title { font-size: 1.15rem; font-weight: 700; color: #1e293b; margin-bottom: 14px; }
    .add-form {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
      padding: 20px; background: #f8fafc;
      border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 30px;
    }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label { font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-field input {
      padding: 9px 11px; font-size: 0.95rem; border-radius: 8px;
      border: 2px solid #cbd5e1; outline: none; transition: all 0.2s;
    }
    .form-field input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .form-field.name     input { min-width: 200px; }
    .form-field.price    input,
    .form-field.sort     input { width: 100px; }
    .form-field.category input { width: 140px; }
    .add-btn {
      padding: 9px 22px; font-size: 0.95rem; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white; font-weight: 700; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 3px 10px rgba(37,99,235,0.3); height: 40px; align-self: flex-end;
    }
    .add-btn:hover { background: linear-gradient(135deg,#1e40af,#1e3a8a); transform: translateY(-1px); }

    /* Table */
    .table-wrap { overflow-x: auto; border: 2px solid #e2e8f0; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th {
      background: #f8fafc; color: #64748b; font-weight: 700;
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 13px 12px; text-align: left; border-bottom: 2px solid #e2e8f0;
    }
    th.center, td.center { text-align: center; }
    th.right,  td.right  { text-align: right; }
    td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.dirty { background: #fffbeb; }
    tbody tr:not(.dirty):hover { background: #f8fafc; }

    td input[type="text"],
    td input[type="number"] {
      width: 100%; padding: 6px 8px; font-size: 0.9rem;
      border-radius: 6px; border: 1.5px solid #e2e8f0; outline: none;
      background: transparent; transition: all 0.2s;
    }
    td input[type="text"]:focus,
    td input[type="number"]:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
    tbody tr.dirty td input { border-color: #fbbf24; background: white; }

    td input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #2563eb; }

    .delete-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 7px; border: none;
      background: #fef2f2; color: #dc2626; cursor: pointer;
      transition: all 0.2s; font-size: 1rem; margin-left: auto;
    }
    .delete-btn:hover { background: #dc2626; color: white; }

    .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; font-size: 1rem; }

    @media (max-width: 768px) {
      .header h1 { font-size: 1.5rem; }
      .add-form   { flex-direction: column; align-items: stretch; }
      .form-field.name input,
      .form-field.price input,
      .form-field.category input,
      .form-field.sort input { width: 100%; min-width: auto; }
    }
  </style>
</head>
<body>

<!-- PIN OVERLAY -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <h2>Admin Access Required</h2>
    <p>Enter your PIN to access the menu editor</p>
    <form id="pinForm" onsubmit="return false;">
      <div class="pin-input-group">
        <input type="password" id="pinInput" placeholder="Enter PIN" autocomplete="off" autofocus />
      </div>
      <button type="submit" class="pin-submit">Access Menu Editor</button>
      <div class="pin-error" id="pinError"></div>
    </form>
  </div>
</div>

<!-- MAIN CARD -->
<div class="container" id="mainContainer">

  <div class="header">
    <div>
      <h1>Menu Editor</h1>
      <div class="sub">Manage drink menu and pricing</div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- UNSAVED CHANGES BANNER -->
  <div class="save-banner" id="saveBanner">
    <div class="save-banner-text" id="bannerText">You have unsaved changes</div>
    <div style="display:flex;gap:10px;">
      <button class="discard-btn" onclick="discardChanges()">Discard</button>
      <button class="save-all-btn" id="saveAllBtn" onclick="saveAll()">Save Changes</button>
    </div>
  </div>

  <div class="topbar">
    <div class="status" id="status">Loading menu...</div>
    <div class="links">
      <a href="/">Customer Order Page</a>
      <a href="/staff.html">Individual Orders</a>
      <a href="/inventory.html">Group Order</a>
    </div>
  </div>

  <div class="content">

    <h2 class="section-title">Add New Drink</h2>
    <div class="add-form">
      <div class="form-field name">
        <label>Drink Name</label>
        <input type="text" id="newName" placeholder="e.g., Coca-Cola" />
      </div>
      <div class="form-field price">
        <label>Price ($)</label>
        <input type="number" id="newPrice" placeholder="1.00" step="0.01" min="0" />
      </div>
      <div class="form-field category">
        <label>Category</label>
        <input type="text" id="newCategory" placeholder="e.g., Soda" />
      </div>
      <div class="form-field sort">
        <label>Sort Order</label>
        <input type="number" id="newSort" placeholder="100" />
      </div>
      <button class="add-btn" onclick="addDrink()">+ Add Drink</button>
    </div>

    <h2 class="section-title">Current Menu</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center">On</th>
            <th>Drink Name</th>
            <th class="right">Price</th>
            <th>Category</th>
            <th class="right">Sort</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
  const pinOverlay   = document.getElementById("pinOverlay");
  const mainContainer= document.getElementById("mainContainer");
  const pinForm      = document.getElementById("pinForm");
  const pinInput     = document.getElementById("pinInput");
  const pinError     = document.getElementById("pinError");
  const statusEl     = document.getElementById("status");
  const tbody        = document.getElementById("tbody");
  const saveBanner   = document.getElementById("saveBanner");
  const bannerText   = document.getElementById("bannerText");
  const saveAllBtn   = document.getElementById("saveAllBtn");

  let authenticatedPin = sessionStorage.getItem("adminPin");

  // rows: { id, original:{}, tr }
  // dirty: Set of ids
  let menuRows = [];
  const dirty  = new Set();

  /* ── helpers ── */
  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, c =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
  }
  function hdrs() {
    return { "Content-Type":"application/json", "X-Admin-Pin": authenticatedPin || "" };
  }
  async function api(url, opts = {}) {
    const res = await fetch(url, opts);
    if (!res.ok) { const t = await res.text(); throw new Error(t || res.statusText); }
    return res.json();
  }

  /* ── PIN auth ── */
  pinForm.addEventListener("submit", async e => {
    e.preventDefault();
    const pin = pinInput.value.trim();
    if (!pin) { showPinError("Please enter a PIN."); return; }
    try {
      const r = await fetch("/api/auth", { method:"POST", headers:{"X-Admin-Pin":pin} });
      if (r.ok) {
        authenticatedPin = pin;
        sessionStorage.setItem("adminPin", pin);
        pinOverlay.classList.add("hidden");
        mainContainer.classList.add("visible");
        await loadMenu();
      } else {
        showPinError("Incorrect PIN. Please try again.");
        pinInput.value = ""; pinInput.focus();
      }
    } catch { showPinError("Authentication failed. Please try again."); }
  });
  function showPinError(msg) { pinError.textContent = msg; pinError.style.display = "block"; }

  function logout() {
    authenticatedPin = null;
    sessionStorage.removeItem("adminPin");
    pinOverlay.classList.remove("hidden");
    mainContainer.classList.remove("visible");
    pinInput.value = ""; pinError.style.display = "none"; pinInput.focus();
  }

  /* ── load & render ── */
  async function loadMenu() {
    statusEl.textContent = "Loading menu…";
    dirty.clear(); updateBanner();
    try {
      const rows = await api("/api/menu?all=1", { headers: hdrs() });
      render(rows);
      statusEl.textContent = `${rows.length} drink${rows.length === 1 ? "" : "s"}`;
    } catch (e) {
      statusEl.textContent = "Failed to load menu.";
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state">Error: ${esc(e.message)}</td></tr>`;
    }
  }

  function render(rows) {
    tbody.innerHTML = "";
    menuRows = [];
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No drinks yet — add one above.</td></tr>`;
      return;
    }
    for (const d of rows) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="center"><input type="checkbox" data-k="is_available" ${d.is_available ? "checked" : ""}></td>
        <td><input type="text"   data-k="name"       value="${esc(d.name)}"></td>
        <td class="right"><input type="number" data-k="price"      value="${Number(d.price).toFixed(2)}" step="0.01" min="0" style="text-align:right"></td>
        <td><input type="text"   data-k="category"   value="${esc(d.category ?? "")}"></td>
        <td class="right"><input type="number" data-k="sort_order" value="${esc(d.sort_order)}" style="text-align:right"></td>
        <td><input type="text"   data-k="notes"      value="${esc(d.notes ?? "")}"></td>
        <td><button class="delete-btn" title="Delete drink">🗑</button></td>
      `;

      // mark dirty on any change
      tr.querySelectorAll("input[data-k]").forEach(inp => {
        inp.addEventListener("change", () => { dirty.add(d.id); tr.classList.add("dirty"); updateBanner(); });
        inp.addEventListener("input",  () => { dirty.add(d.id); tr.classList.add("dirty"); updateBanner(); });
      });

      // delete
      tr.querySelector(".delete-btn").addEventListener("click", async () => {
        if (!confirm(`Delete "${d.name}"?`)) return;
        try {
          statusEl.textContent = "Deleting…";
          await api(`/api/menu/${d.id}`, { method:"DELETE", headers: hdrs() });
          dirty.delete(d.id);
          await loadMenu();
        } catch (e) { alert("Delete failed: " + e.message); statusEl.textContent = "Delete failed."; }
      });

      menuRows.push({ id: d.id, tr });
      tbody.appendChild(tr);
    }
  }

  /* ── unsaved changes banner ── */
  function updateBanner() {
    const n = dirty.size;
    if (n === 0) {
      saveBanner.classList.remove("visible");
    } else {
      bannerText.textContent = `${n} unsaved change${n === 1 ? "" : "s"}`;
      saveBanner.classList.add("visible");
    }
  }

  function discardChanges() {
    if (!confirm("Discard all unsaved changes?")) return;
    loadMenu();
  }

  /* ── save all ── */
  async function saveAll() {
    if (dirty.size === 0) return;
    saveAllBtn.disabled = true;
    saveAllBtn.textContent = "Saving…";
    const failed = [];

    for (const { id, tr } of menuRows) {
      if (!dirty.has(id)) continue;
      const payload = collectRow(tr);
      try {
        await api(`/api/menu/${id}`, { method:"PATCH", headers: hdrs(), body: JSON.stringify(payload) });
        dirty.delete(id);
        tr.classList.remove("dirty");
      } catch (e) {
        failed.push(e.message);
      }
    }

    saveAllBtn.disabled = false;
    saveAllBtn.textContent = "Save Changes";
    updateBanner();

    if (failed.length) {
      alert("Some saves failed:\n" + failed.join("\n"));
      statusEl.textContent = "Partial save — check errors above.";
    } else {
      statusEl.textContent = "All changes saved.";
      await loadMenu();
    }
  }

  function collectRow(tr) {
    const p = {};
    tr.querySelectorAll("input[data-k]").forEach(inp => {
      const k = inp.getAttribute("data-k");
      if (inp.type === "checkbox") p[k] = inp.checked;
      else p[k] = inp.value;
    });
    p.price      = Number(p.price);
    p.sort_order = Number(p.sort_order);
    if (p.notes    === "") p.notes    = null;
    if (p.category === "") p.category = null;
    return p;
  }

  /* ── add drink ── */
  async function addDrink() {
    const name  = document.getElementById("newName").value.trim();
    const price = Number(document.getElementById("newPrice").value);
    const cat   = document.getElementById("newCategory").value.trim() || "Drinks";
    const sort  = Number(document.getElementById("newSort").value || 100);

    if (!name)                              { alert("Drink name is required."); return; }
    if (!Number.isFinite(price)||price < 0) { alert("Valid price is required."); return; }

    try {
      statusEl.textContent = "Adding drink…";
      await api("/api/menu", {
        method: "POST", headers: hdrs(),
        body: JSON.stringify({ name, price, category: cat, sort_order: sort, is_available: true })
      });
      ["newName","newPrice","newCategory","newSort"].forEach(id => document.getElementById(id).value = "");
      await loadMenu();
    } catch (e) { alert("Add failed: " + e.message); statusEl.textContent = "Add failed."; }
  }

  /* ── keyboard shortcut: Ctrl/Cmd+S to save ── */
  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "s" && dirty.size > 0) {
      e.preventDefault();
      saveAll();
    }
  });

  /* ── auto-login ── */
  if (authenticatedPin) {
    fetch("/api/auth", { method:"POST", headers:{"X-Admin-Pin": authenticatedPin} })
      .then(r => {
        if (r.ok) {
          pinOverlay.classList.add("hidden");
          mainContainer.classList.add("visible");
          loadMenu();
        } else {
          sessionStorage.removeItem("adminPin");
          authenticatedPin = null;
          pinInput.focus();
        }
      })
      .catch(() => pinInput.focus());
  } else {
    pinInput.focus();
  }
</script>
</body>
</html>
