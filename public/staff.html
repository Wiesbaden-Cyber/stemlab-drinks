<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stemlab Drinks - Staff Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
      min-height: 100vh;
      padding: 20px;
    }

    /* PIN LOGIN SCREEN */
    .pin-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .pin-overlay.hidden {
      display: none;
    }

    .pin-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 400px;
      width: 100%;
    }

    .pin-box h2 {
      color: #1e293b;
      margin-bottom: 8px;
      font-size: 1.8rem;
    }

    .pin-box p {
      color: #64748b;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .pin-input-group {
      margin-bottom: 20px;
    }

    .pin-input-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.1rem;
      border-radius: 10px;
      border: 2px solid #cbd5e1;
      outline: none;
      transition: all 0.2s;
      letter-spacing: 0.1em;
    }

    .pin-input-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .pin-submit {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .pin-submit:hover {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
      transform: translateY(-1px);
    }

    .pin-error {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }

    /* MAIN CONTAINER */
    .container {
      max-width: 1200px;
      margin: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      display: none;
    }

    .container.visible {
      display: block;
    }

    .header {
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white;
      padding: 30px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header .subtitle {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .logout-btn {
      padding: 10px 20px;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .flush-btn {
      padding: 10px 20px;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 2px solid rgba(239, 68, 68, 0.6);
      background: rgba(239, 68, 68, 0.15);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .flush-btn:hover {
      background: rgba(239, 68, 68, 0.4);
      border-color: rgba(239, 68, 68, 0.9);
    }

    .topbar {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 16px 30px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    .topbar-left {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .last-updated {
      color: #64748b;
      font-size: 0.9rem;
    }

    .filter-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .filter-group label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #64748b;
    }

    .filter-group select {
      padding: 8px 12px;
      font-size: 0.9rem;
      border-radius: 8px;
      border: 2px solid #cbd5e1;
      outline: none;
      cursor: pointer;
      background: white;
      transition: all 0.2s;
    }

    .filter-group select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .refresh-btn {
      padding: 8px 16px;
      font-size: 0.9rem;
      border-radius: 8px;
      border: 2px solid #cbd5e1;
      background: white;
      color: #64748b;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      border-color: #94a3b8;
      background: #f8fafc;
    }

    .links {
      display: flex;
      gap: 16px;
    }

    .links a {
      font-size: 0.95rem;
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    
    .links a:hover {
      color: #1e40af;
      text-decoration: underline;
    }

    .content {
      padding: 30px;
    }

    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .order-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
    }

    .order-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
      transform: translateY(-2px);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .order-ticket {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1e293b;
    }

    .order-status {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .order-status.new {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .order-status.in_progress {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .order-status.fulfilled {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .order-status.cancelled {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .order-customer {
      font-size: 1.05rem;
      color: #475569;
      margin-bottom: 12px;
    }

    .order-total {
      font-size: 1.4rem;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 16px;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .items-table thead {
      background: #f8fafc;
    }

    .items-table th {
      padding: 10px 8px;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid #e2e8f0;
    }

    .items-table th.right,
    .items-table td.right {
      text-align: right;
    }

    .items-table td {
      padding: 10px 8px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.9rem;
      color: #334155;
    }

    .items-table tbody tr:last-child td {
      border-bottom: none;
    }

    .order-meta {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .order-meta div {
      margin-bottom: 4px;
    }

    .order-meta strong {
      color: #475569;
    }

    .order-actions {
      display: flex;
      gap: 10px;
    }

    .fulfill-btn {
      flex: 1;
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .fulfill-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    .fulfill-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .cancel-btn {
      flex: 0 0 auto;
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid #dc2626;
      background: white;
      color: #dc2626;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cancel-btn:hover:not(:disabled) {
      background: #dc2626;
      color: white;
    }

    .cancel-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      color: #64748b;
    }

    .empty-state-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #475569;
      margin-bottom: 8px;
    }

    .empty-state-hint {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .empty-state-hint code {
      background: #e2e8f0;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #475569;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.6rem;
      }

      .orders-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .topbar-left {
        flex-direction: column;
        align-items: stretch;
      }

      .links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<!-- PIN LOGIN OVERLAY -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <h2>Staff Access Required</h2>
    <p>Enter your PIN to access the staff portal</p>
    <form id="pinForm" onsubmit="return false;">
      <div class="pin-input-group">
        <input 
          type="password" 
          id="pinInput" 
          placeholder="Enter PIN" 
          autocomplete="off"
          autofocus
        />
      </div>
      <button type="submit" class="pin-submit" id="pinSubmitBtn">Access Staff Portal</button>
      <div class="pin-error" id="pinError">Incorrect PIN. Please try again.</div>
    </form>
  </div>
</div>

<!-- MAIN CONTAINER -->
<div class="container" id="mainContainer">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>Staff Portal</h1>
        <div class="subtitle">View and manage customer orders</div>
      </div>
      <div class="header-actions">
        <button class="flush-btn" onclick="flushOrders()">Clear All Orders</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="topbar">
    <div class="topbar-left">
      <div class="last-updated" id="lastUpdated">Loading orders...</div>
      <div class="filter-group">
        <label>Filter:</label>
        <select id="filter">
          <option value="new" selected>New</option>
          <option value="in_progress">In Progress</option>
          <option value="fulfilled">Fulfilled</option>
          <option value="cancelled">Cancelled</option>
          <option value="">All Orders</option>
        </select>
      </div>
      <button class="refresh-btn" id="refreshBtn">Refresh</button>
    </div>
    <div class="links">
      <a href="/">Customer Order Page</a>
      <a href="/inventory.html">Group Order</a>
      <a href="/menu.html">Menu Editor</a>
    </div>
  </div>

  <div class="content">
    <div class="orders-grid" id="orders"></div>
    <div class="empty-state" id="empty" style="display:none;">
      <div class="empty-state-title">No orders found</div>
      <div class="empty-state-hint">
        Try switching the filter to <code>All Orders</code> to see everything.
      </div>
    </div>
  </div>
</div>

<script>
  const pinOverlay = document.getElementById("pinOverlay");
  const mainContainer = document.getElementById("mainContainer");
  const pinForm = document.getElementById("pinForm");
  const pinInput = document.getElementById("pinInput");
  const pinError = document.getElementById("pinError");
  const ordersEl = document.getElementById("orders");
  const emptyEl = document.getElementById("empty");
  const lastUpdatedEl = document.getElementById("lastUpdated");
  const filterEl = document.getElementById("filter");
  const refreshBtn = document.getElementById("refreshBtn");

  let authenticatedPin = sessionStorage.getItem("adminPin");
  let autoRefreshInterval = null;

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }

  function money(n) {
    const x = Number(n);
    return Number.isFinite(x) ? `$${x.toFixed(2)} / €${x.toFixed(2)}` : "$0.00 / €0.00";
  }

  function fmtTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return Number.isNaN(d.getTime()) ? iso : d.toLocaleString();
  }

  function headers() {
    return {
      "Content-Type": "application/json",
      "X-Admin-Pin": authenticatedPin || ""
    };
  }

  // PIN AUTHENTICATION
  pinForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const pin = pinInput.value.trim();
    
    if (!pin) {
      pinError.textContent = "Please enter a PIN.";
      pinError.style.display = "block";
      return;
    }

    try {
      const res = await fetch("/api/auth", {
        method: "POST",
        headers: { "X-Admin-Pin": pin }
      });

      if (res.ok) {
        authenticatedPin = pin;
        sessionStorage.setItem("adminPin", pin);
        pinOverlay.classList.add("hidden");
        mainContainer.classList.add("visible");
        await refresh();
        startAutoRefresh();
      } else {
        pinError.textContent = "Incorrect PIN. Please try again.";
        pinError.style.display = "block";
        pinInput.value = "";
        pinInput.focus();
      }
    } catch (e) {
      pinError.textContent = "Authentication failed. Please try again.";
      pinError.style.display = "block";
    }
  });

  function logout() {
    authenticatedPin = null;
    sessionStorage.removeItem("adminPin");
    stopAutoRefresh();
    pinOverlay.classList.remove("hidden");
    mainContainer.classList.remove("visible");
    pinInput.value = "";
    pinError.style.display = "none";
    pinInput.focus();
  }

  function startAutoRefresh() {
    stopAutoRefresh();
    autoRefreshInterval = setInterval(refresh, 3000);
  }

  function stopAutoRefresh() {
    if (autoRefreshInterval) {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
    }
  }

  async function fetchOrders() {
    const status = filterEl.value;
    const url = status ? `/api/orders?status=${encodeURIComponent(status)}` : `/api/orders`;
    const res = await fetch(url, { headers: headers() });
    if (!res.ok) throw new Error("Failed to load orders");
    return await res.json();
  }

  async function fulfillOrder(id) {
    const res = await fetch(`/api/orders/${id}/fulfill`, {
      method: "PATCH",
      headers: headers()
    });
    if (!res.ok) throw new Error("Failed to fulfill order");
  }

  async function cancelOrder(id) {
    const res = await fetch(`/api/orders/${id}/cancel`, {
      method: "PATCH",
      headers: headers()
    });
    if (!res.ok) throw new Error("Failed to cancel order");
  }

  function render(orders) {
    ordersEl.innerHTML = "";

    if (!orders || orders.length === 0) {
      emptyEl.style.display = "block";
      return;
    }
    emptyEl.style.display = "none";

    for (const o of orders) {
      const card = document.createElement("div");
      card.className = "order-card";

      const statusClass = (o.status || "new").toLowerCase();
      const isDone = o.status === "fulfilled" || o.status === "cancelled";
      const canFulfill = !isDone;
      const canCancel = !isDone;

      const items = Array.isArray(o.items) ? o.items : [];
      const itemRows = items.map(it => `
        <tr>
          <td>${esc(it.name)}</td>
          <td class="right">${esc(it.quantity)}</td>
          <td class="right">${money(it.unitPrice)}</td>
          <td class="right">${money(it.lineTotal)}</td>
        </tr>
      `).join("");

      card.innerHTML = `
        <div class="order-header">
          <div class="order-ticket">#${esc(o.order_number)}</div>
          <div class="order-status ${esc(statusClass)}">${esc(o.status)}</div>
        </div>

        <div class="order-customer">Customer: ${esc(o.customer_name)}</div>
        <div class="order-total">Total: ${money(o.total_cost)}</div>

        <table class="items-table">
          <thead>
            <tr>
              <th>Drink</th>
              <th class="right">Qty</th>
              <th class="right">Unit</th>
              <th class="right">Line</th>
            </tr>
          </thead>
          <tbody>
            ${itemRows || `<tr><td colspan="4" style="text-align:center; color:#94a3b8;">No items</td></tr>`}
          </tbody>
        </table>

        <div class="order-meta">
          <div><strong>Created:</strong> ${esc(fmtTime(o.created_at))}</div>
          <div><strong>Fulfilled:</strong> ${esc(fmtTime(o.fulfilled_at))}</div>
          <div><strong>Order ID:</strong> ${esc(o.id)}</div>
        </div>

        <div class="order-actions">
          <button class="fulfill-btn" data-action="fulfill" ${canFulfill ? "" : "disabled"}>
            ${o.status === "fulfilled" ? "Fulfilled" : o.status === "cancelled" ? "Cancelled" : "Mark as Fulfilled"}
          </button>
          <button class="cancel-btn" data-action="cancel" ${canCancel ? "" : "disabled"}>
            Cancel Order
          </button>
        </div>
      `;

      card.querySelector('[data-action="fulfill"]').addEventListener("click", async (e) => {
        const btn = e.target;
        btn.disabled = true;
        btn.textContent = "Fulfilling...";
        try {
          await fulfillOrder(o.id);
          await refresh();
        } catch (err) {
          alert(err.message);
          btn.disabled = false;
          btn.textContent = "Mark as Fulfilled";
        }
      });

      card.querySelector('[data-action="cancel"]').addEventListener("click", async (e) => {
        if (!confirm(`Cancel order #${o.order_number} for ${o.customer_name}?`)) return;
        const btn = e.target;
        btn.disabled = true;
        btn.textContent = "Cancelling...";
        try {
          await cancelOrder(o.id);
          await refresh();
        } catch (err) {
          alert(err.message);
          btn.disabled = false;
          btn.textContent = "Cancel Order";
        }
      });

      ordersEl.appendChild(card);
    }
  }

  async function refresh() {
    try {
      const orders = await fetchOrders();
      render(orders);
      lastUpdatedEl.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    } catch (e) {
      lastUpdatedEl.textContent = `Error: ${e.message}`;
    }
  }

  async function flushOrders() {
    if (!confirm("Delete ALL orders permanently? This cannot be undone.")) return;
    if (!confirm("Are you sure? Every order will be erased.")) return;
    try {
      const res = await fetch("/api/orders", { method: "DELETE", headers: headers() });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Flush failed");
      alert(`Done — ${data.deleted} order${data.deleted === 1 ? "" : "s"} deleted.`);
      await refresh();
    } catch (e) {
      alert("Failed to clear orders: " + e.message);
    }
  }

  refreshBtn.addEventListener("click", refresh);
  filterEl.addEventListener("change", refresh);

// Auto-login if PIN is already in sessionStorage
  if (authenticatedPin) {
    fetch("/api/auth", { method: "POST", headers: { "X-Admin-Pin": authenticatedPin } })
      .then(r => {
        if (r.ok) {
          pinOverlay.classList.add("hidden");
          mainContainer.classList.add("visible");
          refresh();
          startAutoRefresh();
        } else {
          sessionStorage.removeItem("adminPin");
          authenticatedPin = null;
          pinInput.focus();
        }
      })
      .catch(() => pinInput.focus());
  } else {
    pinInput.focus();
  }
</script>

</body>
</html>
