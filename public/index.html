<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stemlab Drinks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white;
      padding: 30px 30px 24px 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header .subtitle {
      font-size: 1rem;
      opacity: 0.95;
      margin-bottom: 16px;
    }

    .notice-banner {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .notice-banner strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.95rem;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 16px 30px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    .menu-status {
      color: #64748b;
      font-size: 0.9rem;
    }

    .links {
      display: flex;
      gap: 16px;
    }

    .links a {
      font-size: 0.95rem;
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    
    .links a:hover {
      color: #1e40af;
      text-decoration: underline;
    }

    .content {
      padding: 30px;
    }

    .drinks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .drink {
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 18px;
      background: #ffffff;
      transition: all 0.2s;
    }

    .drink:hover {
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
      transform: translateY(-2px);
    }

    .drink-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: #1e293b;
    }

    .drink-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .price {
      font-weight: 700;
      color: #2563eb;
      font-size: 1.05rem;
    }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1e40af;
      font-weight: 600;
      border: 1px solid #bfdbfe;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .qty-btn {
      width: 38px;
      height: 38px;
      padding: 0;
      cursor: pointer;
      border-radius: 8px;
      border: 2px solid #2563eb;
      background: white;
      color: #2563eb;
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .qty-btn:hover:not(:disabled) {
      background: #2563eb;
      color: white;
    }

    .qty-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .qty-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .qty {
      min-width: 32px;
      text-align: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #1e293b;
    }

    .cart-section {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .cart-header {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }

    .cart-display {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: center;
    }

    .cart-items {
      color: #64748b;
      font-size: 1rem;
    }

    .cart-total {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2563eb;
    }

    .submit-section {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .name-input {
      flex: 1;
      min-width: 250px;
      padding: 14px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid #cbd5e1;
      outline: none;
      transition: all 0.2s;
    }

    .name-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .submit-btn {
      padding: 14px 28px;
      font-size: 1.05rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .submit-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
      transform: translateY(-1px);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .clear-btn {
      padding: 14px 24px;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid #cbd5e1;
      background: white;
      color: #64748b;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #94a3b8;
      background: #f8fafc;
    }

    .confirmation {
      margin-top: 16px;
      padding: 20px 24px;
      border-radius: 10px;
      background: #dcfce7;
      color: #166534;
      display: none;
      border: 2px solid #86efac;
    }

    .confirmation-ticket {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .confirmation-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      opacity: 0.85;
    }

    .confirmation-items {
      font-size: 0.9rem;
      margin-bottom: 10px;
      line-height: 1.8;
    }

    .confirmation-total {
      font-size: 1.05rem;
      font-weight: 700;
      border-top: 1px solid #86efac;
      padding-top: 10px;
    }

    .confirmation-note {
      margin-top: 10px;
      font-size: 0.82rem;
      opacity: 0.75;
      font-style: italic;
    }

    .confirmation-dismiss {
      margin-top: 14px;
      padding: 8px 20px;
      font-size: 0.9rem;
      border-radius: 8px;
      border: 2px solid #166534;
      background: transparent;
      color: #166534;
      font-weight: 600;
      cursor: pointer;
    }

    .confirmation-dismiss:hover {
      background: #166534;
      color: white;
    }

    .error {
      margin-top: 16px;
      padding: 16px 20px;
      border-radius: 10px;
      background: #fee2e2;
      color: #991b1b;
      display: none;
      font-weight: 600;
      border: 2px solid #fca5a5;
    }

    .empty-menu {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
      }
      
      .drinks {
        grid-template-columns: 1fr;
      }
      
      .submit-section {
        flex-direction: column;
        align-items: stretch;
      }
      
      .name-input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Stemlab Drinks</h1>
    <div class="subtitle">Order refreshments during class!</div>
    
    <div class="notice-banner">
      <strong>Important Information:</strong>
      We accept both USD ($) and EUR (€) on a 1:1 basis.
    </div>
  </div>

  <div class="topbar">
    <div class="menu-status" id="menuStatus">Loading menu...</div>
    <div class="links"></div>
  </div>

  <div class="content">
    <div class="drinks" id="drinks"></div>

    <div class="cart-section">
      <div class="cart-header">Your Order</div>
      <div class="cart-display">
        <div class="cart-items" id="cartSummary">0 items • $0.00 / €0.00</div>
        <div class="cart-total" id="cartTotal">$0.00 / €0.00</div>
      </div>
    </div>

    <div class="submit-section">
      <input 
        type="text" 
        id="customerName" 
        class="name-input"
        placeholder="Enter your name (FIRST AND LAST)" 
        autocomplete="name" 
      />
      <button class="submit-btn" id="submitBtn" onclick="submitOrder()">Submit Order</button>
      <button class="clear-btn" onclick="clearOrder()">Clear</button>
    </div>

    <div class="confirmation" id="confirmation">
      <div class="confirmation-ticket" id="confTicket"></div>
      <div class="confirmation-name" id="confName"></div>
      <div class="confirmation-items" id="confItems"></div>
      <div class="confirmation-total" id="confTotal"></div>
      <div class="confirmation-note">Please remember your order number. Staff will call it when your order is ready.</div>
      <button class="confirmation-dismiss" onclick="document.getElementById('confirmation').style.display='none'">Dismiss</button>
    </div>
    <div class="error" id="errorBox"></div>
  </div>
</div>

<script>
  // Loaded from /api/menu (DB-backed)
  let drinks = [];                 // array of {id,name,price,category,notes,...}
  const quantities = {};           // drinkId -> qty

  const drinksEl = document.getElementById("drinks");
  const menuStatusEl = document.getElementById("menuStatus");
  const cartSummaryEl = document.getElementById("cartSummary");
  const cartTotalEl = document.getElementById("cartTotal");
  const confirmationEl = document.getElementById("confirmation");
  const errorBoxEl = document.getElementById("errorBox");
  const submitBtn = document.getElementById("submitBtn");

  function money(n) {
    const x = Number(n);
    return Number.isFinite(x) ? `$${x.toFixed(2)} / €${x.toFixed(2)}` : "$0.00 / €0.00";
  }

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }

  function showError(msg) {
    errorBoxEl.textContent = msg;
    errorBoxEl.style.display = "block";
    setTimeout(() => (errorBoxEl.style.display = "none"), 4000);
  }

  function showConfirmation(data, customerName, orderedItems) {
    document.getElementById("confTicket").textContent = `Order #${data.orderNumber} — Confirmed!`;
    document.getElementById("confName").textContent = `Name: ${customerName}`;

    const itemLines = orderedItems.map(({ name, qty, price }) =>
      `${qty}x ${name} — ${money(price * qty)}`
    ).join("<br>");
    document.getElementById("confItems").innerHTML = itemLines;

    const total = orderedItems.reduce((s, i) => s + i.price * i.qty, 0);
    document.getElementById("confTotal").textContent = `Total: ${money(total)}`;

    confirmationEl.style.display = "block";
    confirmationEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  async function loadMenu() {
    menuStatusEl.textContent = "Loading menu...";
    try {
      const res = await fetch("/api/menu"); // backend returns only available drinks
      if (!res.ok) throw new Error("Failed to load menu");
      drinks = await res.json();

      // Reset quantities to match menu
      for (const k of Object.keys(quantities)) delete quantities[k];
      for (const d of drinks) quantities[d.id] = 0;

      renderDrinks();
      updateCart();
      menuStatusEl.textContent = `Menu loaded: ${drinks.length} items available`;
    } catch (e) {
      menuStatusEl.textContent = "Menu failed to load.";
      showError(e.message || "Menu failed to load");
    }
  }

  function renderDrinks() {
    drinksEl.innerHTML = "";

    if (!drinks.length) {
      drinksEl.innerHTML = `<div class="empty-menu">No drinks available right now.</div>`;
      return;
    }

    for (const d of drinks) {
      const qty = quantities[d.id] || 0;

      const div = document.createElement("div");
      div.className = "drink";

      const notes = d.notes ? `<span class="tag">${esc(d.notes)}</span>` : "";
      const category = d.category ? `<span class="tag">${esc(d.category)}</span>` : "";

      div.innerHTML = `
        <div class="drink-title">${esc(d.name)}</div>
        <div class="drink-meta">
          <span class="price">$${Number(d.price).toFixed(2)} / €${Number(d.price).toFixed(2)}</span>
          ${category}
          ${notes}
        </div>
        <div class="controls">
          <button class="qty-btn" onclick="changeQty(${d.id}, -1)" ${qty === 0 ? 'disabled' : ''}>−</button>
          <span class="qty">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${d.id}, 1)">+</button>
        </div>
      `;

      drinksEl.appendChild(div);
    }
  }

  function changeQty(drinkId, delta) {
    const cur = quantities[drinkId] || 0;
    quantities[drinkId] = Math.max(0, cur + delta);
    renderDrinks();
    updateCart();
  }

  function updateCart() {
    let total = 0;
    let itemCount = 0;

    for (const d of drinks) {
      const qty = quantities[d.id] || 0;
      itemCount += qty;
      total += qty * Number(d.price);
    }

    cartSummaryEl.textContent = `${itemCount} item${itemCount === 1 ? "" : "s"} • ${money(total)}`;
    cartTotalEl.textContent = money(total);
  }

  function clearOrder() {
    for (const k of Object.keys(quantities)) quantities[k] = 0;
    renderDrinks();
    updateCart();
  }

  async function submitOrder() {
    const customerName = document.getElementById("customerName").value.trim();
    if (!customerName) {
      showError("Please enter your name.");
      document.getElementById("customerName").focus();
      return;
    }

    const items = [];
    for (const d of drinks) {
      const qty = quantities[d.id] || 0;
      if (qty > 0) items.push({ drinkId: d.id, quantity: qty });
    }

    if (items.length === 0) {
      showError("Please add at least one drink.");
      return;
    }

    submitBtn.disabled = true;

    try {
      const res = await fetch("/api/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ customerName, items })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Order failed");

      const orderedItems = drinks
        .filter(d => (quantities[d.id] || 0) > 0)
        .map(d => ({ name: d.name, qty: quantities[d.id], price: Number(d.price) }));

      clearOrder();
      document.getElementById("customerName").value = "";
      showConfirmation(data, customerName, orderedItems);
    } catch (e) {
      showError(e.message || "Could not submit order");
    } finally {
      submitBtn.disabled = false;
    }
  }

  // Load menu on startup
  loadMenu();
</script>

</body>
</html>
